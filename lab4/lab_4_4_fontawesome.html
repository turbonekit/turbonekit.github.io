<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Меню с Font Awesome</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
	<style>
		html { background: #f0f0f0; }
		body { font-family: Georgia, serif; }
		.menu { width: 200px; background: #fff; padding: 8px 0; }
		.menu ul { list-style: none; margin: 0; padding: 0 12px; }
		.menu li { margin: 8px 0; }
		.menu li a {
			display: inline-block;
			color: #6a88ad;
			text-decoration: underline;
			padding-left: 20px;
			position: relative;
		}
		.menu li a::before {
			font-family: "Font Awesome 6 Free";
			font-weight: 900;
			position: absolute;
			left: 0;
			top: 2px;
			font-size: 12px;
			color: #222;
		}
		.menu > ul > li > a::before { content: "\f146"; }
		.menu li li a::before { content: "\f111"; font-size: 7px; top: 6px; }
		.menu li ul { display: none; padding-left: 20px; margin-top: 8px; }
		.menu li:hover > ul { display: block; }
		.menu li:hover > a::before { content: "\f0fe"; }
	</style>
</head>
<body>
	<nav class="menu">
		<ul>
			<li><a href="#">Фильмы</a>
				<ul>
					<li><a href="#">Экшн</a></li>
					<li><a href="#">Мелодрамы</a></li>
					<li><a href="#">Сериалы</a></li>
					<li><a href="#">Семейные</a></li>
				</ul>
			</li>
			<li><a href="#">Музыка</a>
				<ul>
					<li><a href="#">Классика</a></li>
					<li><a href="#">Джаз</a></li>
					<li><a href="#">Рок</a></li>
					<li><a href="#">Грандж</a></li>
				</ul>
			</li>
			<li><a href="#">Софт</a>
				<ul>
					<li><a href="#">Графика</a></li>
					<li><a href="#">3D-моделирование</a></li>
					<li><a href="#">Машинопись</a></li>
					<li><a href="#">Переводчики</a></li>
				</ul>
			</li>
			<li><a href="#">Игры</a>
				<ul>
					<li><a href="#">РПГ</a></li>
					<li><a href="#">Шутеры</a></li>
					<li><a href="#">Пасьянсы</a></li>
				</ul>
			</li>
		</ul>
	</nav>
</body>
</html>
