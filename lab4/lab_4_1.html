<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Оформление вертикального меню</title>
	<style>
		body {
			font-family: Georgia, serif;
			background: #f3f3f3;
		}

		.menu {
			width: 200px;
			background: #336699;
		}
		
		.menu ul {
			list-style: none;
			margin: 0;
			padding: 5px 10px;
		}
		
		.menu li {
			padding: 5px 0;
		}
		
		.menu li a {
			display: block;
			padding: 10px;
			text-transform: uppercase;
			text-decoration: none;
			background: #f2f2f2;
			color: #8bb2d9;
			border: 1px solid #d9d9d9;
		}
		
		.menu li a:hover {
			background: #fff9bf;
			color: #333333;
		}
	</style>
</head>
<body>
	<nav class="menu">
		<ul>
			<li><a href="#">Фильмы</a></li>
			<li><a href="#">Музыка</a></li>
			<li><a href="#">Софт</a></li>
			<li><a href="#">Игры</a></li>
		</ul>
	</nav>
</body>
</html>
