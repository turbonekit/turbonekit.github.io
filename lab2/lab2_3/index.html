<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe</title>
    <style>
        body {
            margin: 0;
        }

        .frames {
            display: flex;
            width: 1000px;
            height: 100vh;
        }

        iframe {
            border: none;
            height: 100vh;
        }

        .menu-frame {
            width: 200px;
        }

        .content-frame {
            width: 800px;
        }
    </style>
</head>
<body>
    <div class="frames">
        <iframe src="menu.html" name="menu" class="menu-frame"></iframe>
        <iframe src="doc.html" name="content" class="content-frame"></iframe>
    </div>
</body>
</html>
